<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Btg's music player</title>
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <div class="logo">
          <h1>Btg's Music Player</h1>
        </div>
        <nav class="nav-menu">
          <ul>
            <li>
              <a href="" class="active"
                ><i class="fa-solid fa-music"></i>My Music</a
              >
            </li>
          </ul>
        </nav>
        <section class="upload-section">
          <div class="upload-box">
            <label for="mp3-upload" class="btn-upload"
              ><i class="fa-solid fa-upload"></i>Upload mp3</label
            >
            <input
              type="file"
              id="mp3-upload"
              accept="audio/mp3"
              multiple
              hidden
            />
          </div>
        </section>
      </aside>

      <main class="main-content">
        <header class="header">
          <div class="search-container">
            <input type="text" id="search-bar" placeholder="Search music.." />
            <button class="btn-search">
              <i class="fa-solid fa-search"></i>
            </button>
          </div>
        </header>
        <div class="content-body">
          <section class="music-list">
            <div class="music-header">
              <h2>My Music</h2>
              <div class="play-controls">
                <button class="shuffle-album" aria-label="Shuffle"><i class="fa-solid fa-shuffle"></i></button>
                <button class="play-album" aria-label="Play album"><i class="fa-solid fa-play"></i></button>
              </div>
            </div>
            <div class="music-list-container">
              <article class="music-card">
              </article>
            </div>
          </section>
        </div>
      </main>

      <footer class="music-player" aria-label="music-controller">
        <div class="now-playing">
          <div class="current-cover-placeholder">
            <i class="fa-solid fa-music"></i>
          </div>
          <div class="track-info">
            <div class="track-title"></div>
            <div class="track-artist"></div>
          </div>
        </div>

        <div class="player-controls">
          <div class="control-buttons">
            <button class="shuffle"><i class="fa-solid fa-shuffle"></i></button>
            <button class="play-back"><i class="fa-solid fa-backward-step"></i></button>
            <button class="play-main"><i class="fa-solid fa-play"></i></button>
            <button class="play-next"><i class="fa-solid fa-forward-step"></i></button>
            <button class="repeat"><i class="fa-solid fa-repeat"></i></button>
          </div>
          <div class="progress-container">
            <span></span>
            <input
              type="range"
              id="progress-bar"
              value="0"
              min="0"
              max="100"
            />
            <span></span>
          </div>
        </div>

        <div class="volume-controls">
          <button><i class="fa-solid fa-volume-high"></i></button>
          <input
            type="range"
            id="volume-slider"
            min="0"
            max="1"
            step="0.1"
            value="0.7"
          />
        </div>
      </footer>
    </div>
  </body>
  <script src="indexeddb.js"></script>
  <script src="script.js"></script>
</html>
